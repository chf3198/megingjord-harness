<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevEnv Ops — Fleet Dashboard</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/help.css">
    <link rel="stylesheet" href="css/stats.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/driver.js@1.4.0/dist/driver.css">
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.4.0/dist/driver.js.iife.js">
    </script>
    <script defer
        src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <script src="js/health-check.js"></script>
    <script src="js/quota-tracker.js"></script>
    <script src="js/device-monitor.js"></script>
    <script src="js/live-stats.js"></script>
    <script src="js/quota-live.js"></script>
    <script src="js/render-panels.js"></script>
    <script src="js/help-tour.js"></script>
    <script src="js/app.js"></script>
</head>
<body x-data="dashboardApp()" x-init="init()">
    <header class="header">
        <h1>🖥️ DevEnv Ops</h1>
        <div class="header-actions">
            <span class="status-badge" :class="overallStatus">
                <span x-text="overallStatus"></span>
            </span>
            <button id="btn-refresh" @click="refreshAll()"
                :disabled="loading">↻ Refresh</button>
            <button id="btn-help" @click="startTour()"
                title="Help">❓</button>
        </div>
    </header>
    <main class="dashboard-grid">
        <section id="panel-devices" class="panel">
            <h2>🏗️ Fleet Devices</h2>
            <div x-html="renderDeviceCards(devices)"></div>
        </section>
        <section id="panel-services" class="panel">
            <h2>⚡ Services</h2>
            <div x-html="renderServiceCards(services)"></div>
        </section>
        <section id="panel-quotas" class="panel">
            <h2>📊 Quotas</h2>
            <div x-html="renderQuotaPanel(liveQuotas, quotas)"></div>
        </section>
        <section id="panel-stats" class="panel">
            <h2>📡 Live Fleet Stats</h2>
            <div x-html="renderFleetStats(fleetStats)"></div>
        </section>
    </main>
    <footer class="footer">
        <span>Last refresh: <span x-text="lastRefresh"></span></span>
        <span>devenv-ops v0.1.0</span>
    </footer>
</body>
</html>
