<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevEnv Ops — Fleet Operations Center</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/help.css"><link rel="stylesheet" href="css/stats.css"><link rel="stylesheet" href="css/router.css">
    <link rel="stylesheet" href="css/config.css"><link rel="stylesheet" href="css/views.css"><link rel="stylesheet" href="css/topology.css">
    <link rel="stylesheet" href="css/baton.css"><link rel="stylesheet" href="css/activity.css"><link rel="stylesheet" href="css/wiki.css">
    <link rel="stylesheet" href="css/context.css"><link rel="stylesheet" href="css/github.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
    <script src="js/health-check.js"></script><script src="js/quota-tracker.js"></script>
    <script src="js/device-monitor.js"></script><script src="js/router-tracker.js"></script>
    <script src="js/live-stats.js"></script><script src="js/quota-live.js"></script>
    <script src="js/fleet-topology.js"></script><script src="js/baton-flow.js"></script>
    <script src="js/resource-monitor.js"></script><script src="js/activity-feed.js"></script>
    <script src="js/event-bus.js"></script><script src="js/render-panels.js"></script>
    <script src="js/config-panel.js"></script><script src="js/stress-test.js"></script>
    <script src="js/help-content.js"></script><script src="js/help-user.js"></script><script src="js/help-dev.js"></script>
    <script src="js/wiki-panel.js"></script><script src="js/wiki-reader.js"></script>
    <script src="js/context-flow.js"></script><script src="js/llm-context.js"></script><script src="js/github-monitor.js"></script>
    <script src="js/tooltips.js"></script><script src="js/app-actions.js"></script>
    <script src="js/event-source.js"></script><script src="js/app.js"></script>
</head>
<body x-cloak x-data="dashboardApp()" x-init="init()">
    <header class="header">
        <div class="header-brand">
            <h1>🖥️ DevEnv Ops</h1>
            <span class="status-badge" :class="overallStatus"><span x-text="overallStatus"></span></span>
        </div>
        <nav class="header-nav" aria-label="Dashboard views">
            <button @click="setView('fleet')" :class="{active:isView('fleet')}" data-tip="view-fleet">🌐 Fleet</button>
            <button @click="setView('ops')" :class="{active:isView('ops')}" data-tip="view-ops">📊 Ops</button>
            <button @click="setView('wiki')" :class="{active:isView('wiki')}" data-tip="view-wiki">📚 Wiki</button>
            <button @click="setView('resources')" :class="{active:isView('resources')}" data-tip="view-resources">📦 Resources</button>
            <button @click="setView('help')" :class="{active:isView('help')}" data-tip="view-help">📘 Help</button>
        </nav>
        <div class="header-actions">
            <button id="btn-refresh" @click="refreshAll()" :disabled="loading" data-tip="refresh" title="Refresh all endpoints">↻</button>
            <button id="btn-auto" @click="toggleAutoRefresh()" :aria-pressed="autoRefreshEnabled" data-tip="auto" :title="'Auto-refresh: ' + config.refreshSec + 's'">⏱️</button>
            <button id="btn-test" @click="runQuickTest()" :disabled="testRun.running" data-tip="test" title="Run stress test">🧪</button>
            <button id="btn-tips" @click="toggleTips()" :aria-pressed="tooltipsEnabled" data-tip="tips" title="Toggle tooltips">💡</button>
            <button id="btn-contrast" @click="setHighContrast(!config.highContrast)" :aria-pressed="config.highContrast" data-tip="contrast" title="High contrast">◐</button>
        </div>
    </header>
    <main id="main-content" class="dashboard-grid">
        <template x-if="isView('fleet')"><section id="panel-topology" class="panel" data-tip="topology">
            <h2>🌐 Fleet Topology</h2><div x-html="renderFleetTopology(devices)"></div>
        </section></template>
        <template x-if="isView('fleet')"><section id="panel-baton" class="panel" data-tip="baton">
            <h2>🔄 Agent Baton</h2><div x-html="renderBatonFlow(batonState)"></div>
        </section></template>
        <template x-if="isView('fleet')"><section id="panel-activity" class="panel" data-tip="activity">
            <h2>📡 Live Activity</h2><div x-html="renderActivityFeed(activityLog)"></div>
        </section></template>
        <template x-if="isView('fleet')"><section id="panel-resources" class="panel" data-tip="resource-mon">
            <h2>⚡ Resources</h2><div x-html="renderResourceMonitor(devices, services)"></div>
        </section></template>
        <template x-if="isView('fleet')"><section id="panel-context-flow" class="panel" data-tip="context-flow">
            <h2>🧠 Context Flow</h2><div x-html="renderContextFlow()"></div>
        </section></template>
        <section id="panel-llm-context" class="panel" x-show="isView('ops')" data-tip="llm-context">
            <h2>📐 LLM Context Windows</h2><div x-html="renderLLMContext()"></div></section>
        <section id="panel-github" class="panel" x-show="isView('ops')" data-tip="github">
            <h2>🐙 GitHub Activity</h2><div x-html="renderGitHubMonitor(githubData)"></div></section>
        <section id="panel-quotas" class="panel" x-show="isView('ops')" data-tip="quotas">
            <h2>📊 Quotas</h2><div x-html="renderQuotaPanel(liveQuotas, quotas)"></div></section>
        <section id="panel-router" class="panel" x-show="isView('ops')" data-tip="router">
            <h2>🛣️ Task Router Lanes</h2><div x-html="renderRouterPanel(routerStats)"></div></section>
        <section id="panel-router-log" class="panel" x-show="isView('ops')" data-tip="router-log">
            <h2>📋 LLM Router Log</h2><div x-html="renderRouterLog()"></div></section>
        <section id="panel-config" class="panel" x-show="isView('ops')" data-tip="config">
            <h2>⚙️ Dashboard Settings</h2><div x-html="renderConfigPanel(config, autoRefreshEnabled, tooltipsEnabled)"></div></section>
        <section id="panel-test" class="panel" x-show="isView('ops')" data-tip="test-panel">
            <h2>🧪 Quick Stress Test</h2><div x-html="renderStressPanel(testRun)"></div></section>
        <section id="panel-wiki" class="panel" x-show="isView('ops')" data-tip="wiki">
            <h2>📚 Wiki Health</h2><div x-html="renderWikiPanel(wikiHealth)"></div></section>
        <template x-if="isView('wiki')"><section id="panel-wiki-reader" class="panel full-width" data-tip="wiki-reader">
            <h2>📚 Research Wiki</h2><div x-html="renderWikiReader(wikiPages)"></div>
        </section></template>
        <template x-if="isView('resources')"><section id="panel-devices" class="panel" data-tip="devices">
            <h2>🏗️ Fleet Devices</h2><div x-html="renderDeviceCards(devices)"></div>
        </section></template>
        <template x-if="isView('resources')"><section id="panel-services" class="panel" data-tip="services">
            <h2>⚡ Services</h2><div x-html="renderServiceCards(services)"></div>
        </section></template>
        <template x-if="isView('help')"><section id="panel-help" class="panel full-width" data-tip="help">
            <h2>📘 Help Center</h2><div x-html="renderHelpPanel(helpDevMode)"></div>
        </section></template>
    </main>
    <footer class="footer">
        <span>Last refresh: <span x-text="lastRefresh"></span></span>
        <span>devenv-ops v3.0.0</span>
    </footer>
    <aside id="app-tip" class="app-tip" x-show="activeTip" x-html="activeTip" x-transition.opacity></aside>
</body>
</html>
