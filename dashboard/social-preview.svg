<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="textglow"><feGaussianBlur stdDeviation="8" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="640"/><line x1="40" y1="0" x2="40" y2="640"/>
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="120" y1="0" x2="120" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="280" y1="0" x2="280" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/><line x1="360" y1="0" x2="360" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="440" y1="0" x2="440" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="520" y1="0" x2="520" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/><line x1="680" y1="0" x2="680" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="760" y1="0" x2="760" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="840" y1="0" x2="840" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/><line x1="920" y1="0" x2="920" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/><line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/><line x1="1080" y1="0" x2="1080" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/><line x1="1160" y1="0" x2="1160" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/><line x1="1240" y1="0" x2="1240" y2="640"/>
    <line x1="0" y1="40" x2="1280" y2="40"/><line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/><line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="360" x2="1280" y2="360"/><line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="440" x2="1280" y2="440"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="520" x2="1280" y2="520"/><line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
  </g>

  <!-- Ambient orbs -->
  <ellipse cx="200" cy="180" rx="300" ry="250" fill="url(#orb1)" filter="url(#blur2)"/>
  <ellipse cx="1050" cy="480" rx="350" ry="280" fill="url(#orb2)" filter="url(#blur2)"/>
  <ellipse cx="640" cy="320" rx="200" ry="200" fill="url(#orb1)" filter="url(#blur1)" opacity="0.5"/>

  <!-- Mesh network lines -->
  <g stroke="#58a6ff" stroke-width="1" opacity="0.08">
    <line x1="180" y1="420" x2="640" y2="280"/>
    <line x1="640" y1="280" x2="1100" y2="400"/>
    <line x1="180" y1="420" x2="1100" y2="400"/>
    <line x1="180" y1="420" x2="420" y2="200"/>
    <line x1="640" y1="280" x2="860" y2="180"/>
    <line x1="1100" y1="400" x2="900" y2="500"/>
    <line x1="420" y1="200" x2="860" y2="180"/>
    <line x1="420" y1="200" x2="640" y2="280"/>
    <line x1="860" y1="180" x2="1100" y2="400"/>
  </g>

  <!-- Mesh nodes -->
  <g>
    <circle cx="180" cy="420" r="4" fill="#3fb950" opacity="0.6"/>
    <circle cx="640" cy="280" r="5" fill="#58a6ff" opacity="0.7"/>
    <circle cx="1100" cy="400" r="4" fill="#3fb950" opacity="0.6"/>
    <circle cx="420" cy="200" r="3" fill="#d29922" opacity="0.5"/>
    <circle cx="860" cy="180" r="3" fill="#d29922" opacity="0.5"/>
    <circle cx="900" cy="500" r="3" fill="#58a6ff" opacity="0.4"/>
  </g>

  <!-- Horizontal accent line -->
  <rect x="0" y="312" width="1280" height="1" fill="url(#glow)"/>

  <!-- Terminal bracket decoration -->
  <g transform="translate(340, 200)" opacity="0.15" fill="none" stroke="#58a6ff" stroke-width="2">
    <path d="M0 0 L-20 0 L-20 60 L0 60"/>
  </g>
  <g transform="translate(940, 200)" opacity="0.15" fill="none" stroke="#58a6ff" stroke-width="2">
    <path d="M0 0 L20 0 L20 60 L0 60"/>
  </g>

  <!-- Main title -->
  <text x="640" y="265" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="64" font-weight="700" fill="#e6edf3" filter="url(#textglow)">DevEnv Ops</text>

  <!-- Tagline -->
  <text x="640" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#9ca3af" letter-spacing="4">FLEET DEVELOPMENT WORKBENCH</text>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
    <!-- Pill 1 -->
    <rect x="280" y="370" width="130" height="30" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="300" cy="385" r="4" fill="#3fb950"/><text x="312" y="390" fill="#9ca3af">Fleet Mesh</text>
    <!-- Pill 2 -->
    <rect x="430" y="370" width="120" height="30" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="450" cy="385" r="4" fill="#58a6ff"/><text x="462" y="390" fill="#9ca3af">33 Skills</text>
    <!-- Pill 3 -->
    <rect x="570" y="370" width="140" height="30" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="590" cy="385" r="4" fill="#d29922"/><text x="602" y="390" fill="#9ca3af">Auto-Detect</text>
    <!-- Pill 4 -->
    <rect x="730" y="370" width="130" height="30" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="750" cy="385" r="4" fill="#f85149"/><text x="762" y="390" fill="#9ca3af">Zero PII</text>
    <!-- Pill 5 -->
    <rect x="880" y="370" width="120" height="30" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="900" cy="385" r="4" fill="#3fb950"/><text x="912" y="390" fill="#9ca3af">8 Agents</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#58a6ff" opacity="0.6" letter-spacing="2">COPILOT GOVERNANCE · FLEET MONITORING · AI ORCHESTRATION</text>

  <!-- Version badge -->
  <rect x="575" y="490" width="130" height="26" rx="13" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="640" y="508" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#9ca3af">v3.0.0 · Alpine.js</text>

  <!-- Corner decorations -->
  <path d="M30 30 L30 60 M30 30 L60 30" stroke="#30363d" stroke-width="1.5" fill="none"/>
  <path d="M1250 30 L1250 60 M1250 30 L1220 30" stroke="#30363d" stroke-width="1.5" fill="none"/>
  <path d="M30 610 L30 580 M30 610 L60 610" stroke="#30363d" stroke-width="1.5" fill="none"/>
  <path d="M1250 610 L1250 580 M1250 610 L1220 610" stroke="#30363d" stroke-width="1.5" fill="none"/>
</svg>
