name: Docs Compile
on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'README.md'
      - 'scripts/docs-compile.js'
      - 'scripts/global/docs-transforms.js'
      - '.github/workflows/docs-compile.yml'
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'README.md'
      - 'scripts/docs-compile.js'
      - 'scripts/global/docs-transforms.js'

concurrency:
  group: docs-compile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile:
    name: docs-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Verify README in sync with package.json
        run: node scripts/docs-compile.js --check
