name: Label Lint (ADR-010)
# Enforces ticket status/role binding rules from ADR-010.
# Uses shared rules from scripts/global/label-rules.js (parity with label-scan.yml).
# Also enforces close-protection actions (auto-reopen, role-cleanup-on-close).

on:
  issues:
    types: [labeled, unlabeled, opened, edited, closed, reopened]

permissions:
  issues: write
  contents: read

jobs:
  label-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate ADR-010 label rules
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { evaluate } = require('./scripts/global/label-rules.js');
            const protection = require('./scripts/global/label-lint-close-protection.js');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNum = context.payload.issue.number;
            const marker = '<!-- adr-010-label-lint -->';

            // Phase 1: close-protection actions (auto-reopen, role-cleanup).
            // Decision logic lives in scripts/global/label-lint-close-protection.js
            // so the race-fix (#1515) is unit-testable. Accepts status:review
            // OR status:testing as pre-close (merge-via-Closes-#N path).
            const issue = (await github.rest.issues.get({
              owner, repo, issue_number: issueNum,
            })).data;
            const labels = issue.labels.map(l => l.name);
            const closeRoles = labels.filter(l => l.startsWith('role:'));

            const recentComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: issueNum, per_page: 100,
            });
            const decision = protection.decide({
              state: issue.state, labels, comments: recentComments,
            });
            console.log(`#${issueNum}: close-protection decision=${decision.action} reason=${decision.reason} (#1472)`);
            if (decision.action === 'auto-transition') {
              for (const name of decision.removeLabels) {
                if (labels.includes(name)) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNum, name }).catch(() => {});
                }
              }
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNum, labels: decision.addLabels,
              }).catch(() => {});
              console.log(`#${issueNum}: auto-transitioned (${decision.reason}) → status:done`);
            } else if (decision.action === 'reopen') {
              await github.rest.issues.update({ owner, repo, issue_number: issueNum, state: 'open' });
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNum,
                body: '❌ Close blocked: add `status:done` or `status:cancelled` before closing this issue.',
              });
            }
            if (issue.state === 'closed' && closeRoles.length > 0) {
              const isEpic = labels.includes('type:epic');
              // #1828 Rule E2 v2: Epic may carry role:manager (default lifecycle)
              // OR role:consultant (transient during review). Both are valid at close-time
              // and the close-time scrub should leave neither stripped if they're
              // already gone (the consultant role is dropped at terminal by the
              // close pattern; manager remains for archival per #1472).
              for (const role of closeRoles) {
                if (role === 'role:archived') continue;
                if (isEpic && role === 'role:manager') continue; // #1472 + #1828 E2 v2
                if (isEpic && role === 'role:consultant') continue; // #1828 E2 v2 — transient review role
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: issueNum, name: role,
                }).catch(() => {});
              }
            }

            // Phase 1.5: single-status invariant (Epic #1828 AC6).
            // Decision logic lives in scripts/global/label-lint-status-cardinality.js
            // for unit-testability.
            const statusCardinality = require('./scripts/global/label-lint-status-cardinality.js');
            const statusEval = statusCardinality.evaluate(labels);
            if (!statusEval.ok && statusEval.rule === 'multi-status') {
              const statusMarker = '<!-- adr-010-status-cardinality -->';
              const existingStatusComment = recentComments.find(c => c.body?.includes(statusMarker));
              const body = statusCardinality.violationComment(statusEval, issueNum);
              if (!existingStatusComment) {
                await github.rest.issues.createComment({ owner, repo, issue_number: issueNum, body });
              }
              core.setFailed(`Issue #${issueNum}: multi-status violation (Epic #1828 AC6) — ${statusEval.found.join(', ')}`);
            }

            // Phase 2: evaluate via shared rules and post comment
            const refreshed = (await github.rest.issues.get({
              owner, repo, issue_number: issueNum,
            })).data;
            const violations = evaluate(refreshed);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: issueNum, per_page: 100,
            });
            const lintComment = comments.find(c => c.body?.includes(marker));

            if (violations.length === 0) {
              if (lintComment) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: lintComment.id,
                });
              }
              console.log(`Issue #${issueNum}: label rules OK`);
              return;
            }

            const currentLabels = refreshed.labels.map(l => l.name);
            const body = [
              marker, '',
              '## ⚠️ ADR-010 Label Lint Violation', '',
              `Issue #${issueNum} has invalid label combinations:`, '',
              violations.map(v => `- ${v}`).join('\n'), '',
              '**Current labels**: ' + (currentLabels.length ? currentLabels.map(l => `\`${l}\``).join(', ') : '_none_'),
              '',
              'See [ADR-010](../blob/main/research/adr/010-ticket-status-role-model.md) for the binding model.',
              '',
              '_Posted by label-lint workflow._',
            ].join('\n');

            if (lintComment?.body !== body) {
              if (lintComment) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: lintComment.id, body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNum, body,
                });
              }
            }
            core.setFailed(`Label violations on #${issueNum}: ${violations.length} rule(s) broken.`);
