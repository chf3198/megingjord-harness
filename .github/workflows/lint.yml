name: Lint
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'dashboard/**'
      - 'scripts/**'
      - 'hooks/**'
      - 'instructions/**'
      - 'skills/**'
      - 'tests/**'
      - 'package.json'
      - '**/*.md'
      - '.vale.ini'
      - '.vale/**'
      - '.markdownlint.json'

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_required:
    name: lint-required
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # diff-aware readability gate needs base history (#1434)
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - run: npm install --no-audit --no-fund
      - name: Install ruff (required by lint:py pre-push hook)
        run: pip install ruff
      - name: Pre-push parity smoke
        run: npm run hooks:pre-push
      - name: Formatting check
        run: npm run format:check
      - name: 100-line file limit
        run: npm run lint
      - name: Governance token resolution
        run: npm run governance:tokens
      - name: Governance sync check
        run: npm run governance:sync-check
      - name: Governance compatibility matrix
        run: npm run governance:compatibility:matrix
      - name: Readability gate (diff-aware; #1434)
        run: npm run lint:readability:diff
      - name: Ticket reconciliation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run governance:reconcile
      - name: Markdown lint
        run: npm run lint:md
      - name: Changelog fragment validation (#2128)
        run: node scripts/global/changelog-aggregate.js --validate-only
      - name: Vale prose lint
        # Advisory (vale-action fail_on_error defaults false). reviewdog github-pr-check
        # fetches the PR diff, which GitHub caps at 300 files — a >300-file PR (e.g. the
        # Wiki backfill #3065) makes reviewdog 406 and exit 1, breaking this REQUIRED job
        # on an infra error rather than a prose finding. continue-on-error keeps the
        # advisory intent without blocking merge on large diffs. Follow-on: #3079.
        continue-on-error: true
        uses: errata-ai/vale-action@d89dee975228ae261d22c15adcd03578634d429c # v2
        with:
          files: '.'
          reporter: github-pr-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: No unsuppressed empty catch in github-script blocks
        run: bash scripts/global/catch-empty-lint.sh .github/workflows
      - name: Catch-empty suppression summary
        shell: bash
        run: |
          count=$(grep -Rho '// catch-empty:' .github/workflows 2>/dev/null | wc -l | tr -d ' ')
          {
            echo '### catch-empty suppressions'
            echo "Active suppressions in .github/workflows: $count"
          } >> "$GITHUB_STEP_SUMMARY"
