name: Lint
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'dashboard/**'
      - 'scripts/**'
      - 'hooks/**'
      - 'instructions/**'
      - 'skills/**'
      - 'tests/**'
      - 'package.json'
      - '**/*.md'
      - '.vale.ini'
      - '.vale/**'
      - '.markdownlint.json'

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_required:
    name: lint-required
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - run: npm install --no-audit --no-fund
      - name: Formatting check
        run: npm run format:check
      - name: 100-line file limit
        run: npm run lint
      - name: Readability gate
        run: npm run lint:readability:ci
      - name: Ticket reconciliation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run governance:reconcile
      - name: Markdown lint
        run: npm run lint:md
      - name: Vale prose lint
        uses: errata-ai/vale-action@d89dee975228ae261d22c15adcd03578634d429c # v2
        with:
          files: '.'
          reporter: github-pr-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
