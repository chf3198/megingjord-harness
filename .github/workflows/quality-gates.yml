name: Quality Gates
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality_required:
    name: quality-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Formatting check
        run: npm run format:check
      - name: 100-line lint
        run: npm run lint
      - name: HTTP handler sync-call guard
        run: npm run governance:no-sync-http
      - name: Readability gate
        run: npm run lint:readability:ci
      - name: Router smoke
        run: npm run router:smoke
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Deterministic unit tests
        run: >-
          npx playwright test
          tests/unit-modules.spec.js
          tests/routing-policy.spec.js
          tests/accessibility-baseline.spec.js
          tests/google-quality.spec.js
          tests/no-network-errors.spec.js
          tests/api-smoke.spec.js
          tests/api-smoke-load.spec.js
          tests/agent-signature-cli.spec.js
          tests/pretool-guard-worktree-gate.spec.js
          tests/ci-gate-status-fallback.spec.js
          tests/fleet-resident-pref.spec.js
          tests/fleet-keepalive.spec.js
          tests/merge-gate-unknown-retry.spec.js
          tests/governance-bundle.spec.js
          tests/governance-bundle-push.spec.js
          tests/wrapper-result-contract.spec.js
          tests/cascade-free-cloud-failover.spec.js
          tests/free-cloud-dispatch.spec.js
          tests/free-cloud-usage-report.spec.js
          tests/baton-artifact-builder.spec.js
          tests/review-dispatch-failover.spec.js
          tests/stress-review-dispatch-failover.spec.js
          tests/baton-pr-builders.spec.js
          tests/baton-slot-contract.spec.js
          tests/baton-artifact-cross-runtime.spec.js
          tests/baton-replay-eval.spec.js
          tests/baton-replay-mine.spec.js
          tests/event-schema-v3.spec.js
          tests/wiki-backfill-work-log.spec.js
          tests/wiki-mirror-issue.spec.js
          tests/wiki-reconcile.spec.js
          tests/cursor-adapter.spec.js
          --reporter=line
