name: Secret Detection

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install detect-secrets
        run: pip install --user detect-secrets==1.5.0
      - name: Verify baseline
        run: |
          if [ ! -f .secrets.baseline ]; then
            echo "❌ .secrets.baseline missing"
            exit 1
          fi
      - name: Scan for new secrets
        run: |
          ~/.local/bin/detect-secrets scan --baseline .secrets.baseline \
            --exclude-files 'node_modules' \
            --exclude-files '\.git' \
            --exclude-files 'playwright-report' \
            --exclude-files 'test-results' \
            --exclude-files 'tmp/' \
            --exclude-files 'logs/' \
            --exclude-files '\.dashboard' \
            --exclude-files '\.claude/projects' \
            --exclude-files '\.env' \
            --exclude-files 'package-lock\.json'
