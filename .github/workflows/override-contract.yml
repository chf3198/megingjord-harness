name: override-contract
# Epic #2892 P1-a — fail-closed hard-floor: reject any per-repo override
# (.megingjord/overrides.{yml,yaml,json}) that names a Tier-H security/provenance control.
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  override-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4
        with:
          node-version: '20'
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Enforce hard-floor override contract
        run: node scripts/global/megalint/override-contract.js
