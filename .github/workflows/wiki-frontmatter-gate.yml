# wiki-frontmatter-gate.yml — required PR gate for wiki page frontmatter (#3763, Epic #3719 P1-e).
# Runs on EVERY pull_request (NO paths: filter) so the check is always present and completes — this
# is what makes it safe to mark REQUIRED in the main ruleset (a paths-filtered required check would
# hang "expected" forever on non-wiki PRs and block them). It validates ONLY the wiki pages changed
# in the PR against config/wiki-frontmatter.schema.json (validator = source of truth) and no-ops
# green when no wiki page changed. Navigational files (README/index/log/WIKI-*) are exempt; the
# grandfathered historical corpus is backfilled by #3767.
name: wiki-frontmatter-gate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: wiki-frontmatter-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  frontmatter:
    name: frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate changed wiki-page frontmatter (required)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Changed wiki .md files between the PR base and head. Empty => the gate no-ops green.
          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'wiki/**/*.md' || true)
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "wiki-frontmatter-gate: no changed wiki pages; pass."
            exit 0
          fi
          printf 'Changed wiki pages:\n'; printf '  %s\n' "${CHANGED[@]}"
          node scripts/wiki/frontmatter-gate.js "${CHANGED[@]}"
