name: Baton Gates
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: baton-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collaborator-gate:
    name: collaborator-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) {
              core.setFailed(
                'No linked issue found. Add "Refs #N" to PR body so the baton trail can be verified.'
              );
              return;
            }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue,
            });
            const labels = issue.labels.map(l => l.name);
            const lightweight = ['lane:docs-research', 'lane:docs-only', 'lane:trivial'];
            if (labels.some(l => lightweight.includes(l))) {
              console.log(`Issue #${linkedIssue}: lightweight lane; collaborator gate skipped.`);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const trail = comments.map(c => c.body).join('\n');
            if (!trail.includes('COLLABORATOR_HANDOFF')) {
              core.setFailed(
                `COLLABORATOR_HANDOFF not found in issue #${linkedIssue} comments. ` +
                'Post artifact as a comment on the linked issue — PR body does not satisfy this gate.'
              );
            }

  admin-gate:
    name: admin-gate
    needs: [collaborator-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { checkAdminIndependence } =
              require('./scripts/global/baton-independence.js');
            const { analyzeComments } =
              require('./scripts/global/baton-artifact-governance.js');
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) { core.setFailed('No Refs #N in PR body.'); return; }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue,
            });
            const labels = issue.labels.map(l => l.name);
            const lightweight = ['lane:docs-research', 'lane:docs-only', 'lane:trivial'];
            if (labels.some(l => lightweight.includes(l))) {
              console.log(`Issue #${linkedIssue}: lightweight lane; admin gate skipped.`);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const trail = comments.map(c => c.body).join('\n');
            if (!trail.includes('ADMIN_HANDOFF')) {
              core.setFailed(
                `ADMIN_HANDOFF not found in issue #${linkedIssue} comments. ` +
                'Post artifact as a comment on the linked issue — PR body does not satisfy this gate.'
              );
            }
            const independence = checkAdminIndependence(comments.map(c => ({
              body: c.body,
              author: c.user && c.user.login,
            })));
            if (!independence.ok) core.setFailed(independence.message);
            const signerGov = analyzeComments(comments);
            if (!signerGov.ok) {
              const detail = signerGov.violations
                .map(v => `${v.artifact || 'artifact'}:${v.rule}`)
                .slice(0, 3)
                .join(', ');
              core.setFailed(
                `Signer/role governance violations in issue #${linkedIssue}: ${detail}. ` +
                'Rebuild baton artifacts with scripts/global/baton-comment-build.js.'
              );
            }

  consultant-gate:
    name: consultant-gate
    needs: [admin-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) { core.setFailed('No Refs #N in PR body.'); return; }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const trail = comments.map(c => c.body).join('\n');
            if (!trail.includes('CONSULTANT_CLOSEOUT')) {
              core.setFailed(
                `CONSULTANT_CLOSEOUT not found in issue #${linkedIssue} comments. ` +
                'Post artifact as a comment on the linked issue — PR body does not satisfy this gate.'
              );
            }
