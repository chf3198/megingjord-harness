name: Baton Gates
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: baton-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collaborator-gate:
    name: collaborator-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) {
              core.setFailed(
                'No linked issue found. Add "Refs #N" to PR body so the baton trail can be verified.'
              );
              return;
            }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue,
            });
            const labels = issue.labels.map(l => l.name);
            const lightweight = ['lane:docs-research', 'lane:docs-only', 'lane:trivial', 'lane:research', 'lane:config-only', 'lane:no-code-remediation'];
            if (labels.some(l => lightweight.includes(l))) {
              console.log(`Issue #${linkedIssue}: lightweight lane; collaborator gate skipped.`);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const trail = comments.map(c => c.body).join('\n');
            if (!trail.includes('COLLABORATOR_HANDOFF')) {
              core.setFailed(
                `COLLABORATOR_HANDOFF not found in issue #${linkedIssue} comments. ` +
                'Post artifact as a comment on the linked issue — PR body does not satisfy this gate.'
              );
              return;
            }
            const { validate } = require('./scripts/global/megalint/collaborator-handoff.js');
            // #2562: pass full comment objects (validator reads .body + .user); mapping
            // to bare .body strings false-failed the gate on every PR.
            // #3121: pass the PR file list so doc-coverage can advisory-verify that any
            // surface declared UPDATED actually appears in the diff (wires the #2716 module).
            // #2907: validate() now enforces Pre-handoff verification block presence (hard gate).
            const { data: prFilesData } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number, per_page: 100,
            });
            const prFiles = prFilesData.map(f => f.filename);
            const result = validate({ comments, labels, prFiles });
            if (!result.ok) {
              const detail = (result.violations || []).map(v => v.rule + (v.detail ? ': ' + v.detail : '')).join('; ');
              core.setFailed(`collaborator-handoff violations in #${linkedIssue}: ${detail}`);
            }
            const advisories = (result.violations || []).filter(v => v.severity === 'advisory');
            if (advisories.length) core.warning(`[advisory] collaborator-gate #${linkedIssue}: ` +
              advisories.map(v => v.rule + (v.detail ? ': ' + v.detail : '')).join('; '));

  admin-gate:
    name: admin-gate
    needs: [collaborator-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { checkAdminIndependence } =
              require('./scripts/global/baton-independence.js');
            const { analyzeComments } =
              require('./scripts/global/baton-artifact-governance.js');
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) { core.setFailed('No Refs #N in PR body.'); return; }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue,
            });
            const labels = issue.labels.map(l => l.name);
            const lightweight = ['lane:docs-research', 'lane:docs-only', 'lane:trivial', 'lane:research', 'lane:config-only', 'lane:no-code-remediation'];
            if (labels.some(l => lightweight.includes(l))) {
              console.log(`Issue #${linkedIssue}: lightweight lane; admin gate skipped.`);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const trail = comments.map(c => c.body).join('\n');
            if (!trail.includes('ADMIN_HANDOFF')) {
              core.setFailed(
                `ADMIN_HANDOFF not found in issue #${linkedIssue} comments. ` +
                'Post artifact as a comment on the linked issue — PR body does not satisfy this gate.'
              );
            }
            const independence = checkAdminIndependence(comments.map(c => ({
              body: c.body,
              author: c.user && c.user.login,
            })));
            if (!independence.ok) core.setFailed(independence.message);
            const signerGov = analyzeComments(comments);
            if (!signerGov.ok) {
              const detail = signerGov.violations
                .map(v => `${v.artifact || 'artifact'}:${v.rule}`)
                .slice(0, 3)
                .join(', ');
              core.setFailed(
                `Signer/role governance violations in issue #${linkedIssue}: ${detail}. ` +
                'Rebuild baton artifacts with scripts/global/baton-comment-build.js.'
              );
            }

  consultant-gate:
    name: consultant-gate
    needs: [admin-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) { core.setFailed('No Refs #N in PR body.'); return; }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue,
            });
            const labels = issue.labels.map(l => l.name);
            const lightweight = ['lane:docs-research', 'lane:docs-only', 'lane:trivial', 'lane:research', 'lane:config-only', 'lane:no-code-remediation'];
            if (labels.some(l => lightweight.includes(l))) {
              console.log(`Issue #${linkedIssue}: lightweight lane; consultant gate skipped.`);
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const trail = comments.map(c => c.body).join('\n');
            if (!trail.includes('CONSULTANT_CLOSEOUT')) {
              core.setFailed(
                `CONSULTANT_CLOSEOUT not found in issue #${linkedIssue} comments. ` +
                'Post artifact as a comment on the linked issue — PR body does not satisfy this gate.'
              );
              return;
            }
            // Hard-blocking schema validation (#2909): validate() returns ok=false when any
            // required field (anneal_tickets_filed, mid_flight_flaws, verification-timestamp,
            // rubric, verdict, signer fields) is absent. Advisory-only violations are excluded
            // from the ok=false determination inside validate() itself.
            const { validate, checkCrossFamilyVerdict } =
              require('./scripts/global/megalint/consultant-closeout.js');
            const { checkConsultantFamilyIndependence } =
              require('./scripts/global/megalint/signer-fidelity.js');
            const schemaResult = validate({ comments });
            if (!schemaResult.ok) {
              const blocking = (schemaResult.violations || [])
                .filter(v => v.severity !== 'advisory')
                .map(v => `${v.rule}${v.detail ? ': ' + v.detail : ''}`).join('; ');
              core.setFailed(`consultant-closeout schema violations in #${linkedIssue}: ${blocking}`);
              return;
            }
            // Cross-family independence and verdict remain advisory (#2537).
            const advisoryViols = [
              ...checkConsultantFamilyIndependence(trail),
              ...checkCrossFamilyVerdict(trail),
            ];
            if (advisoryViols.length > 0) {
              const msg = advisoryViols.map(v => `${v.rule}${v.detail ? ': ' + v.detail : ''}`).join('; ');
              core.warning(`[advisory] cross-family gate: ${msg}`);
            }

  changelog-fragment:
    name: changelog-fragment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { validate } = require('./scripts/global/megalint/changelog-fragment-presence.js');
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) { console.log('No Refs #N; skipping.'); return; }
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: parseInt(refsMatch[1]),
            });
            const labels = issue.labels.map(l => l.name);
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const result = validate({ labels, prBody: body, prFiles: files.map(f => f.filename) });
            if (!result.ok) core.setFailed(`changelog-fragment: ${result.reason}`);
            else console.log(`changelog-fragment ok: ${result.reason}`);

  cross-team-response-fidelity:
    name: cross-team-response-fidelity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // #2912: hard-blocking gate (promoted from advisory after soak completion).
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) { console.log('No Refs #N; skipping cross-team-response-fidelity.'); return; }
            const linkedIssue = parseInt(refsMatch[1]);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedIssue, per_page: 100,
            });
            const { validate } = require('./scripts/global/megalint/cross-team-response-fidelity.js');
            const result = validate({ comments });
            if (!result.ok) {
              const blocking = (result.violations || [])
                .filter(v => v.severity !== 'advisory')
                .map(v => `${v.rule}${v.detail ? ': ' + v.detail : ''}`).join('; ');
              if (blocking) core.setFailed(`cross-team-response-fidelity violations in #${linkedIssue}: ${blocking}`);
            }
