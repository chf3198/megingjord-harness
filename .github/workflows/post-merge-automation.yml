name: Post-Merge Automation
on:
  pull_request:
    branches: [main]
    types: [closed]
  issue_comment:
    types: [created]
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

concurrency:
  group: post-merge-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  consultant-activation:
    name: consultant-activation
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const decision = require('./scripts/global/consultant-activation-decision.js');
            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) return;
            const linkedNum = parseInt(refsMatch[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: linkedNum,
            });
            const labels = issue.labels.map(l => l.name);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedNum, per_page: 100,
            });
            const result = decision.decide({ state: issue.state, labels, comments });
            console.log(`#${linkedNum}: consultant-activation decision=${result.action} reason=${result.reason}`);
            // #2877: stale-baton-detector advisory path.
            if (result.action === 'warn-and-advance') {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: linkedNum,
                body: `⚠️ **Stale baton detected** — \`COLLABORATOR_HANDOFF\` is present on this issue but labels were not advanced to \`status:testing\`.\n\nPlease advance the baton: remove \`status:in-progress\` + \`role:collaborator\`, add \`status:testing\` + \`role:admin\`, then re-run the Admin gate.\n\nReason: \`${result.reason}\` | Target: \`${result.target}\` | Timestamp: ${new Date().toISOString()}`,
              });
              return;
            }
            if (result.action !== 'activate') return;
            const remove = labels.filter(l => result.removeLabelsMatching.test(l));
            for (const l of remove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: linkedNum, name: l,
              }).catch(() => {}); // catch-empty: removeLabel may return 404 when label is already absent.
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: linkedNum, labels: result.addLabels,
            });
            const sha = context.payload.pull_request.merge_commit_sha?.slice(0, 7);
            const prUrl = context.payload.pull_request.html_url;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: linkedNum,
              body: `**Consultant action required** — PR merged (${sha}, ${prUrl})\n\nIssue is now \`status:review\`. Consultant must:\n1. Independently critique the implementation\n2. Post \`CONSULTANT_CLOSEOUT\` as a comment on this issue\n3. Ensure terminal issue closure after closeout\n\nTimestamp: ${new Date().toISOString()}`,
            });

  deferred-final-terminal-close:
    name: deferred-final-terminal-close
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, 'CONSULTANT_CLOSEOUT')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const mod = require('./scripts/global/deferred-final-terminal-close.js');
            const result = await mod.reconcile({
              github: { issues: github.rest.issues, search: github.rest.search },
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNumber: context.payload.issue.number,
              commentBody: context.payload.comment.body || '',
            });
            core.info(`deferred-final-terminal-close: #${context.payload.issue.number} => ${result.action}`);

  stale-review-check:
    name: stale-review-check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'status:review', state: 'open', per_page: 50,
            });
            const cutoff = Date.now() - 72 * 60 * 60 * 1000;
            for (const issue of issues) {
              if (new Date(issue.updated_at) > new Date(cutoff)) continue;
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, per_page: 100,
              });
              const hasCloseout = comments.some(c => c.body.includes('CONSULTANT_CLOSEOUT'));
              const hasStale = comments.some(c => c.body.includes('stale-review-reminder'));
              if (!hasCloseout && !hasStale) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                  body: `**stale-review-reminder** — Issue #${issue.number} has been at \`status:review\` for >72h without \`CONSULTANT_CLOSEOUT\`. Consultant review is required before this work can close.`,
                });
              }
            }
