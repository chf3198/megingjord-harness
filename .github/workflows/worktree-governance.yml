name: Worktree Governance
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - '.github/workflows/worktree-governance.yml'
      - 'scripts/global/worktree-governance-audit.js'
      - 'scripts/worktree-session-start.sh'
      - 'hooks/scripts/validate-branch-name.sh'
      - 'instructions/sandbox-worktree-governance.instructions.md'
      - 'research/concurrent-agent-worktrees-2026-04-24.md'
      - 'package.json'

concurrency:
  group: worktree-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worktree_governance_required:
    name: worktree-governance-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Sandbox governance audit
        run: node scripts/global/worktree-governance-audit.js --json
