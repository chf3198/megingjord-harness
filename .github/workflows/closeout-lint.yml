name: Closeout Lint
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: closeout-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  closeout-schema:
    name: closeout-schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const megalint = require('./scripts/global/megalint/index.js');
            const alias = require('./scripts/global/signer-alias.js');


            const isTransientApiError = (err) => {
              const status = Number(err?.status || err?.response?.status || 0);
              const msg = String(err?.message || '').toLowerCase();
              return [403, 422, 429, 502, 503, 504].includes(status)
                || msg.includes('resource not accessible by integration')
                || msg.includes('rate limit')
                || msg.includes('secondary rate limit');
            };
            const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
            const withApiRetry = async (label, fn, retries = 2, backoffMs = 2000) => {
              let lastErr;
              for (let attempt = 0; attempt <= retries; attempt++) {
                try {
                  return await fn();
                } catch (err) {
                  lastErr = err;
                  if (!isTransientApiError(err) || attempt === retries) break;
                  core.warning(`${label}: transient API error attempt ${attempt + 1}/${retries + 1}; retrying in ${backoffMs}ms (${err.message})`);
                  await wait(backoffMs);
                }
              }
              throw lastErr;
            };

            const body = context.payload.pull_request.body || '';
            const refsMatch = body.match(/Refs\s+#(\d+)/i);
            if (!refsMatch) {
              core.setFailed('No Refs #N in PR body — cannot resolve linked issue.');
              return;
            }
            const linkedIssue = parseInt(refsMatch[1], 10);

            const transientMarker = '<!-- closeout-schema-api-transient -->';
            const postApiTransientAdvisory = async (phase, err) => {
              const status = err?.status || err?.response?.status || 'unknown';
              const advisory = `${transientMarker}
## ⚠️ closeout-schema: api-transient

`
                + `Transient GitHub API failure while reading closeout evidence (${phase}).

`
                + `status: ${status}
message: ${String(err?.message || 'unknown')}

`
                + `Action: rerun failed jobs once GitHub API access recovers. This transient class is advisory for this run.`;
              try {
                const advisoryComments = (await withApiRetry(
                  'issues.listComments(advisory)',
                  () => github.rest.issues.listComments({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: linkedIssue, per_page: 100,
                  })
                )).data;
                const existing = advisoryComments.find(c => (c.body || '').includes(transientMarker));
                if (existing) {
                  await withApiRetry('issues.updateComment(advisory)', () => github.rest.issues.updateComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    comment_id: existing.id, body: advisory,
                  }));
                } else {
                  await withApiRetry('issues.createComment(advisory)', () => github.rest.issues.createComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: linkedIssue, body: advisory,
                  }));
                }
              } catch (advisoryErr) {
                core.warning(`closeout-schema advisory post failed: ${advisoryErr.message}`);
              }
            };

            let issue, labels, lane, comments, prFiles;
            try {
              issue = (await withApiRetry('issues.get(linkedIssue)', () => github.rest.issues.get({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: linkedIssue,
              }))).data;
              labels = issue.labels.map(l => l.name);
              lane = labels.find(l => l.startsWith('lane:')) || 'lane:code-change';
              comments = (await withApiRetry('issues.listComments(linkedIssue)', () => github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: linkedIssue, per_page: 100,
              }))).data;
              // #1554: fetch PR files to detect cross-checkout-destructive
              // symlink deletions. Advisory-first per Epic #1486 Path D.
              prFiles = (await withApiRetry('pulls.listFiles', () => github.rest.pulls.listFiles({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: context.payload.pull_request.number, per_page: 100,
              }))).data;
            } catch (err) {
              if (isTransientApiError(err)) {
                await postApiTransientAdvisory('initial-data-fetch', err);
                core.notice('closeout-schema: api-transient advisory emitted; skipping failure for this transient class.');
                return;
              }
              throw err;
            }
            const prLabels = (context.payload.pull_request.labels || []).map(l => l.name);

            const path = require('path');
            const input = {
              comments, lane, labels,
              body: issue.body || '',
              prBody: body,
              state: issue.state,
              isEpic: labels.includes('type:epic'),
              issueNumber: linkedIssue,
              ticketRef: `#${linkedIssue}`,
              prFiles,
              labelsOnPR: prLabels,
              incidentsPath: path.join(process.env.GITHUB_WORKSPACE || '.', 'incidents.jsonl'),
            };

            const mh = megalint.run('manager-handoff', input);
            const cl = megalint.run('consultant-closeout', input);
            const pg = megalint.run('merge-evidence-pr-gate', input);
            const fe = megalint.run('flaw-emission', input);
            // cross-checkout-destructive uses prFiles + prBody + labelsOnPR
            const xcd = megalint.run('cross-checkout-destructive', {
              prFiles, prBody: body, labels: prLabels,
            });

            const violations = [];
            const aliasViolations = [];
            for (const c of comments) {
              const b = c.body || '';
              const signedBy = (b.match(/Signed-by:\s*([^\n]+)/i) || [])[1];
              const teamModel = (b.match(/Team&Model:\s*([^\n]+)/i) || [])[1];
              const role = (b.match(/Role:\s*([^\n]+)/i) || [])[1];
              if (!signedBy || !teamModel || !role) continue;
              const [team, rest] = teamModel.trim().split(':');
              const model = (rest || '').split('@')[0] || '';
              const check = alias.enforceSignerAlias(team, role.trim().toLowerCase(), signedBy.trim(), { model });
              if (!check.ok) aliasViolations.push(`${role.trim()}: expected ${check.canonical}, got ${signedBy.trim()}`);
            }
            if (mh.found && !mh.ok) {
              for (const v of mh.violations) {
                violations.push(`MANAGER_HANDOFF: ${v.rule} — ${v.detail}`);
              }
            }
            if (cl.found && !cl.ok) {
              for (const v of cl.violations) {
                violations.push(`CONSULTANT_CLOSEOUT: ${v.rule} — ${v.detail}`);
              }
            }
            if (!pg.ok) {
              for (const v of pg.violations) {
                violations.push(`MERGE_EVIDENCE_PR_GATE: ${v.rule} — ${v.detail}`);
              }
            }
            // #1554: cross-checkout-destructive is advisory-first; reported via
            // PR comment marker rather than blocking the closeout-schema gate.
            // Promotion to required is deferred per Epic #1486 Path D pattern.

            const summary = `closeout-schema: manager-handoff=${mh.found ? (mh.ok ? 'PASS' : 'FAIL') : 'absent'} `
              + `consultant-closeout=${cl.found ? (cl.ok ? 'PASS' : 'FAIL') : 'absent'} `
              + `merge-evidence-pr-gate=${pg.skipped ? `SKIP:${pg.skipped}` : (pg.ok ? 'PASS' : 'FAIL')} `
              + `flaw-emission=${fe.skipped ? `SKIP:${fe.skipped}` : (fe.ok ? 'PASS' : 'FAIL')} `
              + `cross-checkout-destructive=${xcd.skipped ? `SKIP:${xcd.skipped}` : (xcd.ok ? 'PASS' : 'ADVISORY')}`;
            console.log(summary);

            const advisoryMarker = '<!-- flaw-emission-required -->';
            const existing = comments.find(c => (c.body || '').includes(advisoryMarker));
            if (!fe.ok) {
              const advisory = `${advisoryMarker}\n## ❌ Mid-flight flaw accounting required\n\n`
                + `Detected ${fe.mentions} flaw mention(s) in baton artifacts with missing artifact citation nearby.\n`
                + `For each flaw mention, include one of: issue ref (#N), incidents.jsonl pattern_id, memory note path, or anneal_tickets_filed entry.\n\n`
                + fe.violations.map(v => `- ${v.detail}`).join('\n');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existing.id, body: advisory,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: linkedIssue, body: advisory,
                });
              }
              for (const v of fe.violations) {
                violations.push(`FLAW_EMISSION: ${v.rule} — ${v.detail}`);
              }
            } else if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

            // #1554: post cross-checkout-destructive advisory as PR comment (not blocking)
            const xcdMarker = '<!-- cross-checkout-destructive-advisory -->';
            if (!xcd.ok) {
              const advisory = `${xcdMarker}\n## ⚠️ Cross-checkout destructive change advisory\n\n`
                + `This PR deletes ${xcd.deletedSymlinks.length} tracked symlink(s). When collaborators pull this commit, git will force-remove the working-tree entry — including any real directory a collaborator has placed there (e.g., \`npm install\` output, operator-applied repair).\n\n`
                + `Affected paths:\n` + xcd.deletedSymlinks.map(p => `- \`${p}\``).join('\n') + `\n\n`
                + `**To acknowledge** (advisory-only this phase; promotes to required after soak):\n`
                + `- Add to PR body: \`<!-- cross-checkout-destructive: <reason> -->\`\n`
                + `- OR apply label: \`cross-checkout-destructive:approved\`\n\n`
                + `See #1554 and #1539 (the incident this rule guards against).`;
              const prComments = (await withApiRetry('issues.listComments(pr)', () => github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, per_page: 50,
              }))).data;
              const existing = prComments.find(c => (c.body || '').includes(xcdMarker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existing.id, body: advisory,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number, body: advisory,
                });
              }
            }

            if (violations.length) {
              core.setFailed(
                `${summary}\nViolations on issue #${linkedIssue}:\n`
                + violations.map(v => `  • ${v}`).join('\n')
                + `\nSee scripts/global/megalint/ + instructions/role-baton-routing.instructions.md`
              );
            }
            if (aliasViolations.length) {
              core.setFailed(`closeout-schema: signer-alias-fidelity=FAIL\n` + aliasViolations.map(v => `  • ${v}`).join('\n'));
            }
