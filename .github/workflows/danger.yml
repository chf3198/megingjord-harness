name: Danger (PR Governance)
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

concurrency:
  group: danger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  danger_required:
    name: danger-required
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install Danger
        run: npm install --no-save danger
      - name: Run Danger
        # #3249: merge-bypass:admin-exception demotes persistent ERR_STREAM_PREMATURE_CLOSE
        # (Node 22 / GitHub API gzip compat bug) to non-blocking when admin has approved.
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'merge-bypass:admin-exception') }}
        run: npx danger ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
