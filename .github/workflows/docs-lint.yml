name: Docs Lint
on:
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/js/help-*.js'
      - 'instructions/**'
      - 'scripts/**'
      - 'package.json'
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - 'dashboard/js/help-*.js'
      - 'instructions/**'
      - 'scripts/**'
      - 'package.json'

concurrency:
  group: docs-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs_lint:
    name: docs-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Sync wiki cache
        run: |
          mkdir -p "$HOME/.copilot/wiki/wisdom/global/concepts" "$HOME/.copilot/wiki/wisdom/global/entities"
          if [ -d wiki/wisdom/global/concepts ]; then cp -r wiki/wisdom/global/concepts/* "$HOME/.copilot/wiki/wisdom/global/concepts/" 2>/dev/null || true; fi
          if [ -d wiki/wisdom/global/entities ]; then cp -r wiki/wisdom/global/entities/* "$HOME/.copilot/wiki/wisdom/global/entities/" 2>/dev/null || true; fi
      - name: Run docs:lint
        run: node scripts/docs-lint.js
