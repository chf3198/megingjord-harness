name: Research-First Phase Gate Lint
# Advisory lint for research-first Epic signal and EPIC_RESCOPE transition guard.
# Reopen-pause automation (Clause 5) is tracked in #1888 and not implemented here.

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed]

permissions:
  issues: write
  contents: read

jobs:
  research-first-phase-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { validate } = require('./scripts/global/megalint/research-first-phase-gate.js');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNum = context.payload.issue.number;
            const marker = '<!-- megalint-research-first-phase-gate -->';

            const issue = (await github.rest.issues.get({
              owner, repo, issue_number: issueNum,
            })).data;
            const labels = issue.labels.map(l => l.name);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: issueNum, per_page: 100,
            });

            const result = validate({
              labels,
              body: issue.body || '',
              comments,
            });
            const lintComment = comments.find(c => (c.body || '').includes(marker));

            if (!result.found || result.ok) {
              if (lintComment) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: lintComment.id,
                });
              }
              console.log(`Issue #${issueNum}: research-first gate lint OK/skip`);
              return;
            }

            const body = [
              marker, '',
              '## ⚠️ Research-First Phase Gate Violation', '',
              `Issue #${issueNum} matches research-first Epic semantics but gate checks failed.`,
              '',
              '**Violations**:', '',
              result.violations.map(v => `- \`${v.rule}\` — ${v.detail}`).join('\n'), '',
              '**Fix**: add `phase-gate:research-first`, keep canonical 5-clause section text, and post `EPIC_RESCOPE` before leaving `status:in-progress`.', '',
              '_Posted by research-first-phase-gate-lint (advisory — promotes after soak)._',
            ].join('\n');

            if (lintComment) {
              if (lintComment.body !== body) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: lintComment.id, body,
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNum, body,
              });
            }
            core.warning(`Research-first phase gate violation on #${issueNum}: ${result.violations.length} rule(s)`);
