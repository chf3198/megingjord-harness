# wiki-secret-scan.yml — required PR gate: no credential-class secret may land in wiki content (#3772,
# Epic #3719). Runs on EVERY pull_request (NO paths: filter) so the check is always present and completes —
# what makes it safe to mark REQUIRED (a paths-filtered required check hangs "expected" forever on non-wiki
# PRs and blocks them). Scans ONLY the wiki pages changed in the PR; no-ops green when none changed. Backstop
# above the wiki-io.js prevent-at-write redaction, catching edits/commits that bypass writePage.
name: wiki-secret-scan

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: wiki-secret-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Scan changed wiki pages for credential-class secrets (required)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'wiki/**/*.md' || true)
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "wiki-secret-scan: no changed wiki pages; pass."
            exit 0
          fi
          printf 'Changed wiki pages:\n'; printf '  %s\n' "${CHANGED[@]}"
          node scripts/wiki/wiki-secret-scan.js "${CHANGED[@]}"
