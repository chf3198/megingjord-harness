# harness-feature-catalog — drift guard for the canonical feature catalog SSoT.
# Epic #3411 T1.1 (#3439). Runs `catalog:check` + the golden test whenever the
# catalog, its schema, or its validator changes, so the SSoT cannot silently
# drift (cross-family review finding, groq 2026-06-30). Always reports (no
# workflow-level paths filter); path logic is a step-level git-diff gate.
name: harness-feature-catalog
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: harness-feature-catalog-${{ github.ref }}
  cancel-in-progress: false
jobs:
  harness-feature-catalog:
    name: harness-feature-catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect catalog-relevant changes (step-level gate)
        id: changes
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          pattern='^(inventory/harness-feature-catalog\.json|inventory/harness-feature-catalog\.schema\.json|scripts/global/harness-feature-catalog\.js|tests/harness-feature-catalog\.spec\.js|\.github/workflows/harness-feature-catalog\.yml)'
          if git diff --name-only "$base" HEAD | grep -qE "$pattern"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No catalog-relevant files changed — N/A; reporting success."
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: '20'
      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci --no-audit --no-fund
      - name: Validate catalog (derived counts + content hash + SSoT anchor)
        if: steps.changes.outputs.changed == 'true'
        run: npm run catalog:check
      - name: Catalog golden test
        if: steps.changes.outputs.changed == 'true'
        run: npx playwright test tests/harness-feature-catalog.spec.js --reporter=line
