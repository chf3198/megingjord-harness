name: Lockfile Sync
on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/npm-lockfile-sync.yml'
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: npm-lockfile-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-install:
    name: lockfile-sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify lockfile is in sync (npm ci)
        run: npm ci --no-audit --no-fund
