name: Lockfile Sync
on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/npm-lockfile-sync.yml'
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: npm-lockfile-sync-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-install:
    name: lockfile-sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
      - name: Verify lockfile is in sync (npm ci)
        run: npm ci --no-audit --no-fund
