name: Anneal Tier2 Autofile
# Recovery note: if schedule is auto-disabled by GitHub inactivity,
# re-enable this workflow in Actions UI and run one workflow_dispatch.
on:
  schedule:
    - cron: '37 3 * * *'
  workflow_dispatch:

concurrency:
  group: anneal-tier2-autofile-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tier1-prep:
    name: tier1-prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - run: npm ci
      - name: Tier1 dry-run fixture
        run: node scripts/global/anneal-tier1-aggregator.js --dry-run --out anneal-tier1.json
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: anneal-tier1-fixture
          path: anneal-tier1.json

  tier2:
    name: tier2-autofile
    needs: [tier1-prep]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - run: npm ci
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5
        with:
          name: anneal-tier1-fixture
      - name: Tier2 classifier fixture tests
        run: node scripts/global/anneal-tier2-autofile.spec.js
      - name: Schedule actor health tests
        run: node scripts/global/anneal-schedule-health.spec.js
      - name: Review suppression contract tests
        run: node scripts/global/anneal-review.spec.js
      - name: Anneal audit sensor tests
        run: node scripts/global/anneal-audit-sensor.spec.js
      - name: Log rotate tests
        run: node scripts/global/anneal-log-rotate.spec.js
      - name: Schedule actor health check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run --silent anneal:schedule-health
      - name: Tier2 autofile run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/global/workflow-anneal-detect.js --apply --fixture anneal-tier1.json
