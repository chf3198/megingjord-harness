name: Baton FSM Conformance
# fsm-wasm-integrity is a REQUIRED blocking job (Refs #3457, Epic #3411).
# fsm-conformance-advisory remains advisory (replay-eval gated, Refs #3288, Epic #3284).

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/global/baton-fsm/**'
      - 'tests/fixtures/baton-fsm-corpus/**'
      - 'tests/baton-fsm-conformance.spec.js'
      - 'tests/baton-fsm-wasm-integrity.spec.js'
      - 'tests/fsm-wasm-check.spec.js'

permissions:
  contents: read

jobs:
  # BLOCKING — byte-identity check: committed kernel.wasm must match fresh rebuild.
  # Runs on every PR touching the FSM source, build script, grammar, or transitions.
  # Refs #3457, Epic #3411. Do NOT add continue-on-error: true to this job.
  fsm-wasm-integrity:
    name: fsm-wasm-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: WASM byte-identity check (--check mode)
        run: npm run fsm:wasm:check

      - name: WASM integrity spec
        run: node --test tests/baton-fsm-wasm-integrity.spec.js

      - name: WASM check-mode spec
        run: node --test tests/fsm-wasm-check.spec.js

  # ADVISORY — full conformance + matrix generation (replay-eval gated promotion).
  conformance:
    name: fsm-conformance-advisory
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Run conformance tests
        run: node --test tests/baton-fsm-conformance.spec.js

      - name: Run WASM integrity tests
        run: node --test tests/baton-fsm-wasm-integrity.spec.js

      - name: Generate conformance matrix
        run: node scripts/global/baton-fsm/conformance-matrix.js

      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: baton-fsm-conformance-matrix
          path: generated/baton-fsm-conformance-matrix.json
          retention-days: 30
