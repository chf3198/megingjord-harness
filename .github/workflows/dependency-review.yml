name: Dependency Review
on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency_review_required:
    name: dependency-review-required
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Pass merge_group without validation
        if: github.event_name == 'merge_group'
        run: echo "merge_group event — skipping dependency review" && exit 0

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, AGPL-3.0
