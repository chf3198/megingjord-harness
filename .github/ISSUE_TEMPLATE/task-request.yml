name: Task
description: Request a feature, improvement, or work item
labels: ["type:task", "status:backlog", "priority:P2"]
body:
  - type: input
    id: summary
    attributes:
      label: Task summary
      description: Imperative verb phrase (≤72 chars)
      placeholder: "Add LLM router log panel to dashboard"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and motivation
      description: Why this work is needed
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkboxes for definition of done
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Lint clean
        - [ ] Tests pass
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - dashboard
        - hooks
        - skills
        - instructions
        - agents
        - scripts
        - infrastructure
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 — blocks release
        - P2 — important
        - P3 — nice to have
    validations:
      required: true
