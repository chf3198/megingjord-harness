name: Story
description: User-facing feature or capability
labels: ["type:story", "status:backlog", "priority:P2"]
body:
  - type: input
    id: summary
    attributes:
      label: Story summary
      description: Imperative verb phrase (≤72 chars)
      placeholder: "Add fleet health dashboard panel"
    validations:
      required: true
  - type: textarea
    id: user_story
    attributes:
      label: User story
      description: "As a [role], I want [capability], so that [benefit]"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkboxes for definition of done
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Lint clean
        - [ ] Tests pass
    validations:
      required: true
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      description: "Issue number of parent epic (e.g. #11)"
      placeholder: "#11"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - dashboard
        - hooks
        - skills
        - instructions
        - agents
        - scripts
        - infrastructure
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 — blocks release
        - P2 — important
        - P3 — nice to have
    validations:
      required: true
  - type: input
    id: story_points
    attributes:
      label: Story points
      description: Estimation (1, 2, 3, 5, 8, 13)
      placeholder: "5"
