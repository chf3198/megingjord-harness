pre-commit:
  parallel: false
  commands:
    docs-check-on-package-json:
      run: node scripts/global/pre-commit-docs-check.js

pre-push:
  parallel: true
  commands:
    branch-name-regex:
      run: hooks/scripts/validate-branch-name.sh
    lint-line-cap:
      run: npm run lint
    lint-readability:
      run: npm run lint:readability:ci
    lint-js:
      run: npm run lint:js || true
    lint-md:
      run: npm run lint:md
    lint-py:
      run: npm run lint:py || true
    lint-sh:
      run: npm run lint:sh || true
    megalint:
      run: node scripts/global/megalint/index.js
    hydration-lint:
      run: node scripts/global/hydration-lint.js
    closeout-preflight:
      run: node scripts/global/closeout-preflight.js
    # #1613: removed `test-evidence-diff` step. The validator at
    # scripts/global/test-evidence-validator.js requires server-state inputs
    # (PR body labels, PR comments, PR file list) that aren't available
    # pre-push. The prior command called a non-existent --diff-only flag,
    # silently failed, and was suppressed by `|| true`. The gate runs
    # server-side via .github/workflows/test-evidence.yml on PR.
    git-freshness:
      run: node scripts/global/git-freshness-check.js || true
    # #2878: merged-branch-guard — block pushes to already-merged branches.
    merged-branch-guard:
      run: python3 hooks/scripts/merged-branch-guard.py
