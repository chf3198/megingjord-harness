pre-push:
  parallel: true
  commands:
    branch-name-regex:
      run: hooks/scripts/validate-branch-name.sh
    lint-line-cap:
      run: npm run lint
    lint-readability:
      run: npm run lint:readability:ci
    lint-js:
      run: npm run lint:js || true
    lint-md:
      run: npm run lint:md
    lint-py:
      run: npm run lint:py || true
    lint-sh:
      run: npm run lint:sh || true
    megalint:
      run: node scripts/global/megalint/index.js
    closeout-preflight:
      run: node scripts/global/closeout-preflight.js
    test-evidence-diff:
      run: node scripts/global/test-evidence-validator.js --diff-only || true
