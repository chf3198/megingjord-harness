# LiteLLM gateway config — devenv-ops routing backbone
# Deploy on windows-laptop: pip install litellm[proxy] && litellm --config litellm-config.yaml
# Self-hosted only (AC8). Sensitive keys via environment variables, never committed.

model_list:
  - model_name: fleet-primary
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b
      api_base: http://100.78.22.13:11434
  - model_name: fleet-fast
    litellm_params:
      model: ollama/starcoder2:3b
      api_base: http://100.91.113.16:11434
  - model_name: fleet-quality
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://100.91.113.16:11434
  - model_name: fleet-fallback
    litellm_params:
      model: ollama/qwen2.5:7b-instruct
      api_base: http://100.78.22.13:11434
  - model_name: qwen2.5-coder-1.5b
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b
      api_base: http://100.78.22.13:11434
  - model_name: starcoder2-3b
    litellm_params:
      model: ollama/starcoder2:3b
      api_base: http://100.91.113.16:11434
  - model_name: qwen2.5-coder-7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://100.91.113.16:11434
  - model_name: haiku
    litellm_params:
      model: claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: sonnet
    litellm_params:
      model: claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: opus
    litellm_params:
      model: claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-opus-4-7
    litellm_params:
      model: claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  # CF AI text-gen (verified active via direct ai/run probe 2026-05-06; #1048).
  # NOTE: ai/models/search returns deprecated models too; always probe before configuring.
  - model_name: cloud-fleet-primary
    litellm_params:
      model: cloudflare/@hf/mistral/mistral-7b-instruct-v0.2
      api_key: os.environ/CLOUDFLARE_WORKERS_AI_TOKEN
      cloudflare_account_id: os.environ/CLOUDFLARE_ACCOUNT_ID
  - model_name: cloud-fleet-quality
    litellm_params:
      model: cloudflare/@cf/meta/llama-3.1-8b-instruct
      api_key: os.environ/CLOUDFLARE_WORKERS_AI_TOKEN
      cloudflare_account_id: os.environ/CLOUDFLARE_ACCOUNT_ID
  - model_name: cloud-fleet-fast
    litellm_params:
      model: cloudflare/@cf/meta/llama-3.2-3b-instruct
      api_key: os.environ/CLOUDFLARE_WORKERS_AI_TOKEN
      cloudflare_account_id: os.environ/CLOUDFLARE_ACCOUNT_ID

router_settings:
  routing_strategy: latency-based-routing
  routing_strategy_args:
    ttl: 1800
  cooldown_time: 60
  allowed_fails: 2
  fallbacks:
    - fleet-primary:
      - fleet-fast
      - fleet-quality
      - fleet-fallback
      - haiku
      - sonnet
    - fleet-fast:
      - fleet-quality
        - fleet-fallback
        - haiku
        - sonnet
  num_retries: 2
  timeout: 120

litellm_settings:
  success_callback: []
  failure_callback: []
  drop_params: true

budget_manager:
  total_budget: 50.00
  duration: monthly
  budget_alerts:
    - threshold: 0.80
      email: chf3198@yahoo.com

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
